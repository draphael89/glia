name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild -project Glia.xcodeproj -scheme Glia \
            -configuration Release build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO | tail -20
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test -project Glia.xcodeproj -scheme Glia \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO > test.log 2>&1 \
            || (tail -50 test.log; exit 1)
          grep "Test Suite 'All tests' passed" test.log
