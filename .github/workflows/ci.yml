name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild -project Glia.xcodeproj -scheme Glia \
            -configuration Release build \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO | tail -20
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test -project Glia.xcodeproj -scheme Glia \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO > test.log 2>&1 \
            || (tail -50 test.log; exit 1)
          grep "Test Suite 'All tests' passed" test.log

  # glia-context MCP server: build + hermetic unit/e2e/golden tests. Runs on
  # Linux (the server is pure Node + fixtures — no macOS/gbrain dependency), so
  # the app↔MCP contract is gated on every push.
  mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Unit tests (deterministic fixtures)
        run: npm test
      - name: End-to-end loop + degrade + fatal-exit
        run: npm run test:e2e
      - name: Golden injection snapshot
        run: npm run test:golden
