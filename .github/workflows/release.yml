# Release train: push a tag vX.Y.Z → build, (sign + notarize if secrets
# present), assemble DMG, create the GitHub Release with the artifact.
#
# Works WITHOUT secrets: produces an ad-hoc DMG attached to a prerelease
# (clearly labeled unsigned). Add these repo secrets to get a signed +
# notarized release automatically (see docs/RELEASING.md):
#   MACOS_CERT_P12 (base64)   MACOS_CERT_PASSWORD
#   NOTARY_APPLE_ID   NOTARY_PASSWORD (app-specific)   NOTARY_TEAM_ID
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write            # create the GitHub Release

jobs:
  release:
    runs-on: macos-15
    # `secrets` can't be used in `if:` conditions, so surface their presence as
    # job-level env booleans and gate steps on those instead.
    env:
      HAS_CERT: ${{ secrets.MACOS_CERT_P12 != '' && 'true' || 'false' }}
      HAS_NOTARY: ${{ secrets.NOTARY_APPLE_ID != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install xcodegen

      - name: Import Developer ID cert (if provided)
        if: ${{ env.HAS_CERT == 'true' }}
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p ci "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PW" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KEYCHAIN"
          rm /tmp/cert.p12

      - name: Store notary credentials (if provided)
        if: ${{ env.HAS_NOTARY == 'true' }}
        run: |
          xcrun notarytool store-credentials glia-notary \
            --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}"

      - name: Verify the tag matches the app version
        run: |
          # The DMG version comes from project.yml/Info.plist, NOT the tag — so
          # pushing v0.2.0 without bumping project.yml would ship "Glia-0.1.0.dmg"
          # inside a "v0.2.0" release. Fail loudly instead (see RELEASING.md).
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(grep -m1 CFBundleShortVersionString project.yml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) != app version $APP_VERSION in project.yml. Bump project.yml (CFBundleShortVersionString + CFBundleVersion) before tagging — see RELEASING.md."
            exit 1
          fi

      - name: Build DMG (signs + notarizes when the cert/profile exist)
        env:
          NOTARY_PROFILE: ${{ secrets.NOTARY_APPLE_ID != '' && 'glia-notary' || '' }}
        run: bash scripts/make-dmg.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glia-*.dmg
          # Full release ONLY when signed AND notarized. A Developer-ID-signed but
          # UN-notarized DMG is still Gatekeeper-quarantined on other Macs, so it
          # must be a clearly-marked prerelease, not a full release with no warning.
          prerelease: ${{ secrets.MACOS_CERT_P12 == '' || secrets.NOTARY_APPLE_ID == '' }}
          generate_release_notes: true
          body: ${{ secrets.MACOS_CERT_P12 == '' && '⚠️ Unsigned dev build — right-click → Open to bypass Gatekeeper. Signed + notarized releases land once signing secrets are configured.' || secrets.NOTARY_APPLE_ID == '' && '⚠️ Signed but NOT notarized — Gatekeeper will still warn on other Macs (right-click → Open the first time). Notarized releases land once the notary secrets are configured.' || '' }}
