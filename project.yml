name: Glia
options:
  bundleIdPrefix: ai.glia
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MTL_ENABLE_DEBUG_INFO: NO
schemes:
  Glia:
    build:
      targets:
        Glia: all
    run:
      config: Release
    test:
      config: Debug
      targets: [GliaTests]
targets:
  Glia:
    type: application
    platform: macOS
    sources:
      - path: Glia
    dependencies:
      - package: Sparkle
    info:
      path: Glia/Resources/Info.plist
      properties:
        CFBundleName: Glia
        CFBundleDisplayName: Glia
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.productivity
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        CFBundleURLTypes:
          - CFBundleURLName: ai.glia.app
            CFBundleURLSchemes: [glia]
        CoreSpotlightContinuation: true
    entitlements:
      path: Glia/Resources/Glia.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.glia.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
  GliaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GliaTests
    dependencies:
      - target: Glia
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Glia.app/Contents/MacOS/Glia
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.glia.tests
