name: Glia
options:
  bundleIdPrefix: ai.glia
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MTL_ENABLE_DEBUG_INFO: NO
schemes:
  Glia:
    build:
      targets:
        Glia: all
    run:
      config: Release
    test:
      config: Debug
      targets: [GliaTests]
  Glia-MAS:
    build:
      targets:
        Glia-MAS: all
    run:
      config: Release
targets:
  Glia:
    type: application
    platform: macOS
    sources:
      - path: Glia
    dependencies:
      - package: Sparkle
    info:
      path: Glia/Resources/Info.plist
      properties:
        CFBundleName: Glia
        CFBundleDisplayName: Glia
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.productivity
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        CFBundleURLTypes:
          - CFBundleURLName: ai.glia.app
            CFBundleURLSchemes: [glia]
        CoreSpotlightContinuation: true
    entitlements:
      path: Glia/Resources/Glia.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        # Ad-hoc dev builds: Sparkle is Developer-ID-signed and an ad-hoc
        # app has no Team ID to match, so hardened-runtime library
        # validation rejects it. Developer ID releases re-sign the whole
        # bundle under one team (make-dmg.sh), where validation passes —
        # release signing may replace these entitlements without this key.
        com.apple.security.cs.disable-library-validation: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.glia.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
  Glia-MAS:
    type: application
    platform: macOS
    sources:
      - path: Glia
        excludes:
          - "App/Updater.swift"      # Sparkle-free channel
    info:
      path: Glia/Resources/Info-MAS.plist
      properties:
        CFBundleName: Glia
        CFBundleDisplayName: Glia
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.productivity
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        CFBundleURLTypes:
          - CFBundleURLName: ai.glia.app
            CFBundleURLSchemes: [glia]
        CoreSpotlightContinuation: true
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Glia/Resources/Glia-MAS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_NAME: Glia
        PRODUCT_BUNDLE_IDENTIFIER: ai.glia.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS
  GliaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GliaTests
    dependencies:
      - target: Glia
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Glia.app/Contents/MacOS/Glia
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.glia.tests
